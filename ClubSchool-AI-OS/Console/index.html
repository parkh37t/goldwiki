<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClubSchool AI OS — 산출물</title>
  <script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('cs.theme')||'light');}catch(e){}</script>
  <link rel="stylesheet" href="styles.css?v=201" />
</head>
<body class="gallery-body">
  <header class="g-top">
    <div class="g-brand">
      <div class="brand-mark">CS</div>
      <div class="g-brand-t"><strong>ClubSchool AI OS</strong><span>산출물 쇼룸</span></div>
    </div>
    <div class="g-top-actions">
      <button id="g-theme" class="iconbtn" title="다크/라이트 전환" aria-label="테마">🌙</button>
    </div>
  </header>

  <main id="g-main" class="g-main"><!-- 갤러리 렌더 --></main>

  <!-- 산출물 뷰어 (전체화면 오버레이) -->
  <div id="g-viewer" class="g-viewer hidden">
    <div class="g-viewer-bar">
      <button id="gv-back" class="btn ghost">‹ 목록</button>
      <div id="gv-title" class="gv-title"></div>
      <div id="gv-exports" class="gv-exports"></div>
    </div>
    <div id="gv-body" class="g-viewer-body"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="vendor/marked.umd.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="vendor/pptxgen.bundle.js"></script>
  <script src="export.js?v=201"></script>
  <script src="gallery.js?v=201"></script>
</body>
</html>
